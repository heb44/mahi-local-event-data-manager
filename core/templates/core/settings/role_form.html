{% extends 'core/settings/base.html' %}

{% block settings_title %}{{ form_title }}{% endblock %}

{% block settings_content %}
<form method="post" novalidate>
    {% csrf_token %}
    <div>
        <label for="id_name" class="block text-sm font-medium text-gray-700 mb-2">نام نقش</label>
        
        <input 
            type="text" 
            name="name" 
            id="id_name" 
            value="{% if object %}{{ object.name }}{% else %}{{ old_name }}{% endif %}"
            class="w-full text-gray-800 text-sm border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-500 {% if error %}border-red-500 focus:ring-red-500{% endif %}" 
            required
        >
        
        {% if error %}
            <p class="text-xs text-red-600 mt-1">{{ error }}</p>
        {% endif %}
    </div>

    <div class="flex justify-end mt-6 gap-3">
        <a href="{% url 'accounts:role_list' %}" class="px-4 py-2 text-sm bg-gray-200 text-gray-800 rounded-lg hover:bg-gray-300">انصراف</a>
        <button type="submit" class="px-4 py-2 text-sm bg-green-600 text-white rounded-lg hover:bg-green-700">ذخیره</button>
    </div>
</form>
{% endblock %}
