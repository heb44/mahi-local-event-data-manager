<div class="hidden loading-indicator htmx-indicator  py-4 transition-opacity duration-300 ease-in-out [&.htmx-request]:flex [&.htmx-request]:opacity-100 opacity-0">
  <div class="flex items-center justify-center">
    <div class="relative h-5 w-5 ml-1.5">
      <div class="absolute inset-0 rounded-full border-4 border-gray-300"></div>
      <div class="absolute inset-0 animate-spin rounded-full border-4 border-t-indigo-600"></div>
    </div>
    <span class="ml-3 text-sm font-medium text-gray-600">{{ loading_text|default:"در حال برقراری ارتباط ..." }}</span>
  </div>
</div>
