{% load static %}

<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ورود</title>
    {% comment %} <script src="https://cdn.tailwindcss.com"></script> {% endcomment %}
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
    <link rel="stylesheet" href="{% static 'core/css/fonts.css' %}">
    <link rel="stylesheet" href="{% static 'core/css/style.css' %}">
    <link rel="icon" type="image/png" href="{% static 'core/images/fav icon.png' %}">
    <style>
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .form-container {
            animation: fadeIn 0.6s ease-out forwards;
        }
    </style>
</head>
<body class="bg-gray-100">
    <div class="flex items-center justify-center min-h-screen px-4">
        
        <div class="w-full max-w-md p-8 space-y-6 bg-white rounded-2xl shadow-xl form-container">
            <div class="text-center">
                <div class="flex justify-center items-center gap-2 mb-2">
                     <svg class="w-10 h-10 text-indigo-600" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M3 13h2v-2H3v2zm2-2h2v-2H5v2zm2-2h2V7H7v2zm2-2h2V5H9v2zm2-2h2V3h-2v2zm4 2v2h2V7h-2zm2 2v2h2V9h-2zm0 2v2h2v-2h-2zm0 2v2h2v-2h-2zm-2 2h2v2h-2v-2zm-2 2h2v2h-2v-2zm-2 0v2h2v-2h-2z"/>
                    </svg>
                    <h1 class="text-3xl font-bold text-gray-800">مدیریت محوطه</h1>
                </div>
                <p class="text-gray-500">برای ورود، اطلاعات کاربری خود را وارد کنید.</p>
            </div>

            <form class="mt-8 space-y-6" method="POST" action="{% url 'accounts:login' %}">
                {% csrf_token %}
                
                <input type="hidden" name="next" value="{{ next }}">

                {% if form.non_field_errors %}
                    <div class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded-lg relative" role="alert">
                        {% for error in form.non_field_errors %}
                            <span class="block sm:inline">{{ error }}</span>
                        {% endfor %}
                    </div>
                {% endif %}

                <div class="relative">
                    <label for="username" class="sr-only">نام کاربری</label>
                    <span class="material-icons absolute right-3 top-1/2 -translate-y-1/2 text-gray-400">
                        person
                    </span>
                    <input id="username" name="username" type="text" autocomplete="username" required 
                           class="w-full px-4 py-3 pr-12 text-gray-700 bg-gray-50 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition" 
                           placeholder="نام کاربری">
                </div>

                <div class="relative">
                    <label for="password" class="sr-only">رمز عبور</label>
                    <span class="material-icons absolute right-3 top-1/2 -translate-y-1/2 text-gray-400">
                        lock
                    </span>
                    <input id="password" name="password" type="password" autocomplete="current-password" required 
                           class="w-full px-4 py-3 pr-12 text-gray-700 bg-gray-50 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition" 
                           placeholder="رمز عبور">
                </div>

                <div class="flex items-center justify-between text-sm">
                    <div class="flex items-center">
                        </div>
                    <a href="#" class="font-medium text-indigo-600 hover:text-indigo-500 transition">
                        فراموشی رمز عبور؟
                    </a>
                </div>

                <div>
                    <button type="submit" 
                            class="w-full flex justify-center py-3 px-4 border border-transparent rounded-lg shadow-sm text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition-transform transform hover:scale-105">
                        <span class="material-icons mr-2">login</span>
                        ورود
                    </button>
                </div>
            </form>
        </div>

    </div>
</body>
</html>
